<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link rel="icon" href="icons/airbnb.png">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/subheader.css">
  <title>Airbnb Clone</title>
</head>
<body>
  <header class="header">
    <div class="left-section">
      <img class="airbnb-logo" src="images/Airbnb_Logo_Bélo.svg.png" alt="airbnb-logo">
    </div>
    <div class="middle-section">
      <input class="location-bar" type="text" placeholder="Location">
      <button class="search-button">
        <img class="search-icon" src="icons/search-icon.png" alt="search-icon">
      </button>
    </div>
    <div class="right-section">
      <p class="airbnb-text">Become a host</p>
      <img class="globe-icon" src="icons/globe.png" alt="globe-icon">
      <div class="hamburger-button">
        <img class="hamburger-icon" src="icons/hamburger.png" alt="hamburger-icon">
      </div>
    </div>
  </header>
</body>
</html>
